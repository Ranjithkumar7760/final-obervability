services:
  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    env_file:
      - ./observability/tracing-config.env
    ports:
      - "5001:5001"
    environment:
      - SECRET_KEY=poc-secret-key-2024
      - ORDER_SERVICE_URL=http://order-service:5002
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - otel-collector
    networks:
      - ecommerce-net
  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    env_file:
      - ./observability/tracing-config.env
    ports:
      - "5002:5002"
    environment:
      - PAYMENT_SERVICE_URL=http://payment-service:5003
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - auth-service
      - otel-collector
    networks:
      - ecommerce-net
  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    env_file:
      - ./observability/tracing-config.env
    ports:
      - "5003:5003"
    environment:
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - auth-service
      - otel-collector
    networks:
      - ecommerce-net
  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    env_file:
      - ./observability/tracing-config.env
    ports:
      - "5004:5004"
    environment:
      - USER_SERVICE_URL=http://user-service:5005
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - otel-collector
    networks:
      - ecommerce-net
  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    env_file:
      - ./observability/tracing-config.env
    ports:
      - "5005:5005"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
    depends_on:
      - otel-collector
    networks:
      - ecommerce-net
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - order-service
      - payment-service
    networks:
      - ecommerce-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ecommerce-net

  otel-collector:
    build:
      context: ./observability
      dockerfile: Dockerfile.collector
    container_name: otel-collector
    env_file:
      - ./observability/tracing-config.env
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro
      - ./observability/otel-collector-config-tail.yaml:/etc/otelcol/otel-collector-config-tail.yaml:ro
    ports:
      - "4319:4317"
      - "4320:4318"
      - "8889:8889"
    depends_on:
      - jaeger
    networks:
      - ecommerce-net
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - ecommerce-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3010:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - ecommerce-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var:/var:ro
      - /dev/disk/:/dev/disk:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -d "/var/snap/docker/common/var-lib-docker" ] && [ "$$(ls -A /var/snap/docker/common/var-lib-docker 2>/dev/null)" ]; then
          echo "Detected Snap Docker root directory. Running cAdvisor with snap path..."
          exec /usr/bin/cadvisor --docker_root=/var/snap/docker/common/var-lib-docker "$$@"
        else
          echo "Detected standard Docker root directory. Running cAdvisor with standard path..."
          exec /usr/bin/cadvisor --docker_root=/var/lib/docker "$$@"
        fi
    ports:
      - "8080:8080"
    networks:
      - ecommerce-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    networks:
      - ecommerce-net
    restart: unless-stopped

networks:
  ecommerce-net:
    driver: bridge

volumes:
  grafana-storage:
