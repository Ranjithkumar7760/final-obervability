apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 262439760574.dkr.ecr.eu-west-1.amazonaws.com/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: SECRET_KEY
              value: "poc-secret-key-2024"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:5002"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: TRACING_MODE
              valueFrom:
                configMapKeyRef:
                  name: tracing-config
                  key: TRACING_MODE
            - name: OTEL_TRACES_SAMPLER_ARG
              valueFrom:
                configMapKeyRef:
                  name: tracing-config
                  key: OTEL_TRACES_SAMPLER_ARG
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce-poc
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
