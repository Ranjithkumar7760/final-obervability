apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce-poc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: SECRET_KEY
              value: "poc-secret-key-2024"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce-poc
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: AUTH_SERVICE
              value: "http://auth-service:5001"
            - name: PAYMENT_SERVICE
              value: "http://payment-service:5003"
            - name: NOTIFICATION_SERVICE
              value: "http://notification-service:5004"
            - name: USER_SERVICE
              value: "http://user-service:5005"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ecommerce-poc
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: AUTH_SERVICE
              value: "http://auth-service:5001"
            - name: ORDER_SERVICE
              value: "http://order-service:5002"
            - name: NOTIFICATION_SERVICE
              value: "http://notification-service:5004"
            - name: USER_SERVICE
              value: "http://user-service:5005"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ecommerce-poc
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5004
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ecommerce-poc
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce-poc
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 5005
      targetPort: 5005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ecommerce-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ecommerce-poc
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
      nodePort: 30000
